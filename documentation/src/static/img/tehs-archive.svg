<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="archiveTitle archiveDesc">
  <title id="archiveTitle">The Archive</title>
  <desc id="archiveDesc">Archival box with a document and photograph</desc>
  <rect width="200" height="200" fill="#f4f7f5"/>
  <!-- Box body -->
  <rect x="38" y="78" width="124" height="88" rx="4" fill="#2e8555"/>
  <rect x="38" y="78" width="124" height="18" fill="#205d3b"/>
  <!-- Box latch -->
  <rect x="90" y="82" width="20" height="10" rx="2" fill="#c9a227"/>
  <!-- Document peeking out -->
  <rect x="58" y="42" width="52" height="48" rx="2" fill="#fbf8f1" stroke="#3d4a42" stroke-width="1.5"/>
  <line x1="66" y1="54" x2="100" y2="54" stroke="#3d4a42" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="66" y1="62" x2="96" y2="62" stroke="#3d4a42" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="66" y1="70" x2="90" y2="70" stroke="#3d4a42" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- Photo peeking out -->
  <rect x="108" y="48" width="44" height="36" rx="2" fill="#e8efe9" stroke="#3d4a42" stroke-width="1.5"/>
  <circle cx="122" cy="60" r="5" fill="#c9a227" opacity="0.85"/>
  <path d="M112 76 L122 66 L132 72 L146 58 L146 76 Z" fill="#2e8555" opacity="0.55"/>
  <!-- Label plate -->
  <rect x="72" y="112" width="56" height="22" rx="2" fill="#fbf8f1"/>
  <line x1="80" y1="120" x2="120" y2="120" stroke="#3d4a42" stroke-width="1.5" opacity="0.35"/>
  <line x1="84" y1="127" x2="116" y2="127" stroke="#3d4a42" stroke-width="1.5" opacity="0.35"/>
</svg>
